# Hybrid OS - Nginx reverse proxy configuration
# Replace YOUR_DOMAIN with your actual domain (e.g., app.hybrid-os.com)
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/hybrid-os
#   2. ln -s /etc/nginx/sites-available/hybrid-os /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot --nginx -d YOUR_DOMAIN

upstream hybrid_os {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot will add SSL config here after running:
    # sudo certbot --nginx -d YOUR_DOMAIN

    # Security headers (Next.js also sets these, belt-and-suspenders)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static assets - long cache (Next.js hashes filenames)
    location /_next/static/ {
        proxy_pass http://hybrid_os;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check (no logging)
    location /api/health {
        proxy_pass http://hybrid_os;
        access_log off;
    }

    # Main app - all routes
    location / {
        proxy_pass http://hybrid_os;
        proxy_http_version 1.1;

        # WebSocket support (needed for Supabase Realtime on client)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering for SSE/streaming (chat responses)
        proxy_buffering off;
    }

    # Rate limiting zone (optional, app also has its own)
    # Uncomment to add Nginx-level rate limiting:
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # location /api/ {
    #     limit_req zone=api burst=50 nodelay;
    #     proxy_pass http://hybrid_os;
    # }

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
